# Quick-test version: MUSCL Euler, N=200, short time.
# Completes in a few seconds.  For production use argon_shock_muscl_euler.yml.
case_name: argon_shock_muscl_euler_quick

gas: argon

domain.left:
  type: inflow
  pressure: 1.56880625e7
  temperature: 2632.24759509
  velocity: 1168.9

domain.right:
  type: outflow

grid:
  units: cm
  L: 7.600403652e-4
  n: 200
  ghost_cells: 3

initialization:
  type: tanh
  units: SI
  location: 3.0e-6
  thickness: 5.0e-8
  left:
    pressure: 1.56880625e7
    temperature: 2632.24759509
    velocity: 1168.9
  right:
    pressure: 5.0e5
    temperature: 300.0
    velocity: 0.0

solver:
  cfl: 0.5
  time_end: 1.0e-08
  rk: 3
  viscous_terms: false
  inviscid_scheme: muscl
  riemann_solver: hllc
  limiter: minmod

diagnostics:
  log.step: 10
  units: SI
