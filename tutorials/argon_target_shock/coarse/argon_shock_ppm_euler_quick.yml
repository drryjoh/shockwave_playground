# Quick-test version: PPM Euler, N=500, short time.
# Completes in a few seconds.  For production use argon_shock_ppm_euler.yml.
case_name: argon_shock_ppm_euler_quick

gas: argon

domain.left:
  type: inflow
  pressure: 1.56880625e7
  temperature: 2632.24759509
  velocity: 1168.9

domain.right:
  type: outflow

grid:
  units: cm
  L: 7.600403652e-4
  n: 500
  ghost_cells: 3

initialization:
  type: tanh
  units: SI
  location: 3.0e-6
  thickness: 5.0e-8
  left:
    pressure: 1.56880625e7
    temperature: 2632.24759509
    velocity: 1168.9
  right:
    pressure: 5.0e5
    temperature: 300.0
    velocity: 0.0

solver:
  cfl: 0.1
  time_end: 2.3352e-09      # shock exits domain at ~2.8 ns; stop before then
  rk: 3
  viscous_terms: false
  inviscid_scheme: ppm
  riemann_solver: hllc
  limiter: ppm

diagnostics:
  log.step: 20
  snapshot.step: 20      # ~200 steps total → ~10 snapshots
  units: SI
