# PPM Euler + CW84 flattening, N=500, quick test.
# Compare with argon_shock_ppm_euler_quick.yml (no flatten) to see the effect
# of shock flattening on a captured Euler shock.
case_name: argon_shock_ppm_euler_flatten_quick

gas: argon

domain.left:
  type: inflow
  pressure: 1.56880625e7
  temperature: 2632.24759509
  velocity: 1168.9

domain.right:
  type: outflow

grid:
  units: cm
  L: 7.600403652e-4
  n: 500
  ghost_cells: 3

initialization:
  type: tanh
  units: SI
  location: 3.0e-6
  thickness: 5.0e-8
  left:
    pressure: 1.56880625e7
    temperature: 2632.24759509
    velocity: 1168.9
  right:
    pressure: 5.0e5
    temperature: 300.0
    velocity: 0.0

solver:
  cfl: 0.1
  time_end: 2.3352e-09     # shock exits domain at ~2.8 ns; stop before then
  rk: 3
  viscous_terms: false
  inviscid_scheme: ppm
  riemann_solver: hllc
  limiter: ppm
  flatten: true            # CW84/PeleC-style shock flattening
  flatten_z1: 0.75         # lower pressure-ratio threshold (PeleC default)
  flatten_z2: 0.85         # upper pressure-ratio threshold (PeleC default)

diagnostics:
  log.step: 20
  snapshot.step: 20
  units: SI
