# PPM Navier-Stokes + CW84 flattening, N=500, quick test.
# This is the PeleC-like configuration: flattening forces the shock to be
# captured as a discontinuity even though viscous terms are enabled.
# Compare with argon_shock_ppm_ns_quick.yml (no flatten) to see that
# the resolved viscous structure disappears when flattening is active.
case_name: argon_shock_ppm_ns_flatten_quick

gas: argon

domain.left:
  type: inflow
  pressure: 1.56880625e7
  temperature: 2632.24759509
  velocity: 1168.9

domain.right:
  type: outflow

grid:
  units: cm
  L: 7.600403652e-4
  n: 500
  ghost_cells: 3

initialization:
  type: tanh
  units: SI
  location: 3.0e-6
  thickness: 5.0e-8
  left:
    pressure: 1.56880625e7
    temperature: 2632.24759509
    velocity: 1168.9
  right:
    pressure: 5.0e5
    temperature: 300.0
    velocity: 0.0

solver:
  cfl: 0.1
  time_end: 2.3352e-09
  rk: 3
  viscous_terms: true
  viscous_dt: false
  inviscid_scheme: ppm
  riemann_solver: hllc
  limiter: ppm
  flatten: true            # PeleC-like: shock captured despite viscous terms
  flatten_z1: 0.75
  flatten_z2: 0.85

diagnostics:
  log.step: 20
  snapshot.step: 20
  units: SI
