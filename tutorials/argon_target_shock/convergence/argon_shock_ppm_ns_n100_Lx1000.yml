case_name: argon_shock_ppm_ns_n100_Lx1000

gas: argon

domain.left:
  type: inflow
  pressure: 1.56880625e7
  temperature: 2632.24759509
  velocity: 1168.9

domain.right:
  type: outflow

grid:
  units: cm
  L: 7.600403652e-1    # 7.6 mm  (1000x baseline)
  n: 100
  ghost_cells: 3

initialization:
  type: tanh
  units: SI
  location: 3.0e-3     # 3 mm from left
  thickness: 5.0e-8
  left:
    pressure: 1.56880625e7
    temperature: 2632.24759509
    velocity: 1168.9
  right:
    pressure: 5.0e5
    temperature: 300.0
    velocity: 0.0

solver:
  cfl: 0.4
  time_end: 2.3352e-06    # scaled 1000x
  rk: 3
  viscous_terms: true
  viscous_dt: false
  inviscid_scheme: ppm
  riemann_solver: hllc
  limiter: ppm

diagnostics:
  log.step: 20
  snapshot.step: 50
  units: SI
